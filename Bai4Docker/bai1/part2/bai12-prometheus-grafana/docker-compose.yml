services:
  prometheus:
    image: prom/prometheus:latest
    container_name: bai12_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: bai12_grafana
    depends_on:
      - prometheus
    ports:
      - "3002:3000"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: bai12_node_exporter
    ports:
      - "9100:9100"
